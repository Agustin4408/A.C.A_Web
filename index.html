<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renovacion ACA fatima</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <section id="status-update" class="reveal">
    <div class="container">
        <div class="glass-alert">
            <div class="status-badge">
                <span class="pulse-dot"></span>
                En Desarrollo
            </div>
            <div class="alert-content">
                <div class="alert-icon">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <div class="alert-text">
                    <h2>Estamos renovando nuestra casa digital</h2>
                    <p>Estamos puliendo cada detalle para reflejar la esencia de <strong>ACA Fátima</strong>. Pronto descubrirás nuevas secciones, galerías y recursos.</p>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-label">Progreso de actualización</div>
                <div class="progress-track">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
